name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: project-be92e7ab-8e6e-4384-a78
  REGION: asia-northeast3
  SERVICE: fair2026
  IMAGE: asia-northeast3-docker.pkg.dev/project-be92e7ab-8e6e-4384-a78/fair2026/app

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build and push
        run: |
          BUILD_ID=$(gcloud builds submit --tag "${{ env.IMAGE }}:${{ github.sha }}" . --region ${{ env.REGION }} --async --format='value(id)')
          echo "Build started: $BUILD_ID"
          echo "BUILD_ID=$BUILD_ID" >> $GITHUB_ENV

      - name: Wait for build
        run: |
          echo "Waiting for build $BUILD_ID ..."
          while true; do
            STATUS=$(gcloud builds describe "$BUILD_ID" --region ${{ env.REGION }} --format='value(status)' 2>/dev/null || echo "UNKNOWN")
            echo "  status: $STATUS"
            if [ "$STATUS" = "SUCCESS" ]; then break; fi
            if [ "$STATUS" = "FAILURE" ] || [ "$STATUS" = "CANCELLED" ] || [ "$STATUS" = "TIMEOUT" ]; then
              echo "Build failed with status: $STATUS"
              exit 1
            fi
            sleep 10
          done

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image "${{ env.IMAGE }}:${{ github.sha }}" \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 256Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 2
